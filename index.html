
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
    <!-- Include the Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .form-container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #38bdf8;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 4px;
            background-color: #0f172a;
            color: #e2e8f0;
            box-sizing: border-box;
            font-size: 100%;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 100%;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0ea5e9;
        }
        button:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }
        .message {
            margin-top: 15px;
            font-size: 0.875rem;
            text-align: center;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
            select {
                background-color: #0f172a;
                color: #e2e8f0;
                height: 40px;
                width: 100%;
                padding: 10px;
            }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Information Form</h2>
        <form id="investmentForm">
            <div class="form-group">
                <label for="fullName">Your Name</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label for="email">Your Phone Number</label>
                <input type="tel" id="email" minlength="10" maxlength="15" required>
            </div>
            <div class="form-group">
                <label for="companyName">Your Company Name</label>
                <input type="text" id="companyName" required>
            </div>
            <div class="form-group">
                <label for="companyAddress">Your Company Address</label>
                <textarea id="companyAddress" required></textarea>
            </div>
            <div class="form-group">
                <label for="currentSalary">Your Company's Revenue</label>
                <input type="text" id="currentSalary" placeholder="e.g. $80,000" required>
            </div>
            <div class="form-group">
                <label for="expectedSalary">Your Company's Expected Revenue In next 1 year</label>
                <input type="text" id="expectedSalary" placeholder="e.g. $110,000" required>
            </div>
            <div class="form-group">
                <label for="rgscRegistrationNumber">Company's RGSC Registration Number</label>
                <input type="text" id="rgscRegistrationNumber" placeholder="e.g. RGSC-12345" required>
            </div>
            <div class="form-group">
                <label for="category">Category Of IT Business</label>
                <select id="category" required>
                    <option value="">Select a category</option>
                    <option value="Software Development">Software Development</option>
                    <option value="IT Services">IT Services</option>
                    <option value="E-commerce">E-commerce</option>
                    <option value="Fintech">Fintech</option>
                    <option value="Healthtech">Healthtech</option>
                    <option value="Edtech">Edtech</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button type="submit" id="submitBtn">Submit Details</button>
            <div id="formMessage" class="message"></div>
        </form>
    </div>

    <script>
        // Your Supabase Credentials
        const SUPABASE_URL = 'https://exajhhhirwxhkgtneolo.supabase.co';        
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4YWpoaGhpcnd4aGtndG5lb2xvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTEwNTAsImV4cCI6MjA5NTAyNzA1MH0.rfuxeE1VIi0ciFJj8Tj0-LSwC0A_h8hTv8ET8tfn03w';        
        
        // Initialize the client
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('investmentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');
            
            // UI Feedback during load
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            formMessage.textContent = '';

            // Construct payload mapping to your SQL table columns
            // Construct payload mapping to your updated SQL table columns
const payload = {
    name: document.getElementById('fullName').value,
    phone_number: document.getElementById('email').value, // Matches updated column name
    company_name: document.getElementById('companyName').value,
    company_address: document.getElementById('companyAddress').value,
    company_revenue: document.getElementById('currentSalary').value, // Matches updated column name
    expected_revenue: document.getElementById('expectedSalary').value, // Matches updated column name
    rgsc_registration_number: document.getElementById('rgscRegistrationNumber').value, // New field
    it_business_category: document.getElementById('category').value // New field
};

            try {
                // Silently grab the IP address to add to the submission record
                let ipAddress = 'Unknown';
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    ipAddress = ipData.ip;
                } catch(ipErr) {
                    console.log("Could not fetch IP, running default.");
                }

                payload.ip_address = ipAddress;

                // Insert into your newly created 'form_submissions' table
                const { error } = await _supabase
                    .from('form_submissions') 
                    .insert([payload]);

                if (error) throw error;

                // Success State handling
                formMessage.className = 'message success';
                formMessage.textContent = 'Information submitted successfully!';
                document.getElementById('investmentForm').reset();

            } catch (err) {
                // Failure State handling
                formMessage.className = 'message error';
                formMessage.textContent = 'An error occurred. Please try again.';
                console.error("Submission error details:", err);
            } finally {
                // Reset button state
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Details';
            }
        });
    </script>
</body>
</html>
